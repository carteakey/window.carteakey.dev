<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>timelapse — window.carteakey.dev</title>
<meta name="theme-color" content="#000000">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: 'Courier New', Courier, monospace;
    color: #eee;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 13px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  header a {
    color: rgba(255,255,255,0.38);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 0.1em;
    transition: color 0.15s;
  }
  header a:hover { color: rgba(255,255,255,0.85); }
  header h1 {
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.6);
  }

  /* ── Disk info (top-right) ─────────────────────────────────────────── */
  #disk-info {
    margin-left: auto;
    text-align: right;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.06em;
    line-height: 1.7;
  }
  .disk-bar {
    width: 100px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
    overflow: hidden;
    margin-top: 4px;
    margin-left: auto;
  }
  .disk-bar-fill {
    height: 100%;
    background: rgba(255,255,255,0.35);
    border-radius: 1px;
    transition: width 0.6s ease;
  }

  /* ── Layout ────────────────────────────────────────────────────────── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ───────────────────────────────────────────────────────── */
  aside {
    width: 190px;
    flex-shrink: 0;
    border-right: 1px solid rgba(255,255,255,0.07);
    overflow-y: auto;
    padding: 6px 0;
  }
  aside::-webkit-scrollbar { width: 3px; }
  aside::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .day-item {
    padding: 9px 16px;
    font-size: 11px;
    cursor: pointer;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.07em;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.12s, color 0.12s;
    user-select: none;
  }
  .day-item:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.75); }
  .day-item.active { color: #fff; background: rgba(255,255,255,0.07); }
  .day-size { font-size: 9px; color: rgba(255,255,255,0.22); }
  .day-item.active .day-size { color: rgba(255,255,255,0.4); }
  .aside-empty {
    padding: 20px 16px;
    font-size: 10px;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.08em;
  }

  /* ── Player ────────────────────────────────────────────────────────── */
  #player-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    position: relative;
  }
  #tl-video {
    max-width: 100%;
    max-height: 100%;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
  }
  #player-placeholder {
    text-align: center;
    color: rgba(255,255,255,0.18);
    font-size: 11px;
    letter-spacing: 0.12em;
  }
  #now-playing {
    position: absolute;
    top: 14px;
    left: 16px;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.35);
    display: none;
  }
</style>
</head>
<body>

<header>
  <a href="/">← LIVE</a>
  <h1>TIMELAPSE</h1>
  <div id="disk-info">
    <div id="disk-label">—</div>
    <div class="disk-bar"><div class="disk-bar-fill" id="disk-fill" style="width:0%"></div></div>
  </div>
</header>

<main>
  <aside id="day-list">
    <div class="aside-empty">loading…</div>
  </aside>

  <div id="player-area">
    <span id="now-playing"></span>
    <video id="tl-video" controls></video>
    <div id="player-placeholder">select a day</div>
  </div>
</main>

<script>
const video       = document.getElementById('tl-video');
const placeholder = document.getElementById('player-placeholder');
const nowPlaying  = document.getElementById('now-playing');
const dayList     = document.getElementById('day-list');
let activeEl = null;

function loadDay(el, item) {
  if (activeEl) activeEl.classList.remove('active');
  activeEl = el;
  el.classList.add('active');
  video.src = '/static/timelapse/' + item.file;
  video.style.display = 'block';
  placeholder.style.display = 'none';
  nowPlaying.textContent = item.date;
  nowPlaying.style.display = 'block';
  video.play().catch(() => {});
}

fetch('/api/timelapse')
  .then(r => r.json())
  .then(days => {
    dayList.innerHTML = '';
    if (!days.length) {
      dayList.innerHTML = '<div class="aside-empty">no timelapses yet</div>';
      return;
    }
    days.forEach((d, i) => {
      const el = document.createElement('div');
      el.className = 'day-item';
      el.innerHTML = `<span>${d.date}</span><span class="day-size">${d.size_mb}MB</span>`;
      el.addEventListener('click', () => loadDay(el, d));
      dayList.appendChild(el);
      if (i === 0) loadDay(el, d);  // auto-load latest
    });
  })
  .catch(() => { dayList.innerHTML = '<div class="aside-empty">error loading</div>'; });

fetch('/api/disk')
  .then(r => r.json())
  .then(d => {
    const used = d.total_gb - d.free_gb;
    const pct  = Math.min(100, Math.round(used / d.total_gb * 100));
    document.getElementById('disk-label').textContent =
      `${d.free_gb}GB free  ·  snaps ${d.snapshots_mb}MB  ·  tl ${d.timelapse_mb}MB`;
    document.getElementById('disk-fill').style.width = pct + '%';
  })
  .catch(() => {});
</script>
</body>
</html>
